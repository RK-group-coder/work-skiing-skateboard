<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📱 SK8 Phone Preview</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root { --bg: #0a0a0f; --bg2: rgba(99,102,241,0.15); --bg3: rgba(14,165,233,0.08); }
    body.light { --bg: #e8e8ed; --bg2: rgba(99,102,241,0.08); --bg3: rgba(14,165,233,0.05); }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, var(--bg2), transparent),
        radial-gradient(ellipse 60% 40% at 80% 80%, var(--bg3), transparent);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      overflow-x: hidden;
      padding: 40px 20px;
      gap: 28px;
      user-select: none;
      transition: background 0.4s;
    }

    /* ── Top Label ── */
    .top-label {
      text-align: center;
    }
    .top-label h1 {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    /* ── Phone Wrapper ── */
    .phone-outer {
      position: relative;
      filter:
        drop-shadow(0 0 1px rgba(255,255,255,0.08))
        drop-shadow(0 40px 80px rgba(0,0,0,0.95))
        drop-shadow(0 8px 24px rgba(0,0,0,0.7));
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ── Phone Body ── */
    .phone {
      position: relative;
      width: 375px;
      height: 812px;
      border-radius: 55px;
      padding: 13px;
      background:
        linear-gradient(160deg,
          #3a3a3c 0%,
          #1c1c1e 30%,
          #111 60%,
          #2a2a2c 100%
        );
      box-shadow:
        inset 0 0 0 0.5px rgba(255,255,255,0.22),
        inset 0 1px 0 rgba(255,255,255,0.18),
        inset 0 -1px 0 rgba(0,0,0,0.5),
        0 0 0 1px rgba(0,0,0,0.8);
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* Titanium edge highlight */
    .phone::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 55px;
      border: 1.5px solid transparent;
      background: linear-gradient(160deg, rgba(255,255,255,0.3), rgba(255,255,255,0), rgba(255,255,255,0.15)) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* ── Side Buttons ── */
    .btn { position: absolute; background: linear-gradient(180deg, #3d3d3f, #2a2a2c); }

    /* Power (right) */
    .btn-power {
      right: -3.5px; top: 195px;
      width: 3.5px; height: 88px;
      border-radius: 0 3px 3px 0;
      box-shadow: inset -1px 0 0 rgba(255,255,255,0.1);
    }
    /* Action (left top) */
    .btn-action {
      left: -3.5px; top: 148px;
      width: 3.5px; height: 38px;
      border-radius: 3px 0 0 3px;
      box-shadow: inset 1px 0 0 rgba(255,255,255,0.1);
    }
    /* Volume up */
    .btn-vol-up {
      left: -3.5px; top: 205px;
      width: 3.5px; height: 72px;
      border-radius: 3px 0 0 3px;
      box-shadow: inset 1px 0 0 rgba(255,255,255,0.1);
    }
    /* Volume down */
    .btn-vol-down {
      left: -3.5px; top: 292px;
      width: 3.5px; height: 72px;
      border-radius: 3px 0 0 3px;
      box-shadow: inset 1px 0 0 rgba(255,255,255,0.1);
    }

    /* ── Screen ── */
    .screen {
      width: 100%;
      height: 100%;
      border-radius: 43px;
      overflow: hidden;
      background: #000;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── Dynamic Island ── */
    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 36px;
      background: #000;
      border-radius: 20px;
      z-index: 30;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 11px;
    }
    /* Camera dot inside Dynamic Island */
    .camera-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #1a2a3a, #0d0d0d);
      border: 1px solid #1a2535;
      position: relative;
      box-shadow: inset 0 0 4px rgba(80,140,255,0.15);
    }
    .camera-dot::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #080e18;
      box-shadow: 0 0 0 1.5px #1a3050, 0 0 5px rgba(80,160,255,0.25);
    }

    /* ── iOS Status Bar ── */
    .status-bar {
      height: 58px;
      flex-shrink: 0;
      display: flex;
      align-items: flex-end;
      padding: 0 30px 10px;
      justify-content: space-between;
      background: transparent;
      position: relative;
      z-index: 20;
    }
    .status-time {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.4px;
    }
    .status-icons {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    /* ── iframe ── */
    iframe {
      width: 100%;
      flex: 1;
      border: none;
      display: block;
      background: #fff;
      min-height: 0;
      /* hide scrollbar in supporting browsers */
      scrollbar-width: none;
    }
    iframe::-webkit-scrollbar { display: none; }

    /* ── Bottom Controls ── */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .controls-label {
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .device-btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .dev-btn {
      padding: 7px 18px;
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: all 0.2s;
      outline: none;
    }
    .dev-btn:hover {
      background: rgba(255,255,255,0.09);
      color: rgba(255,255,255,0.85);
      border-color: rgba(255,255,255,0.2);
    }
    .dev-btn.active {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border-color: rgba(255,255,255,0.35);
    }

    .refresh-btn {
      padding: 7px 18px;
      border-radius: 100px;
      border: 1px solid rgba(99,102,241,0.3);
      background: rgba(99,102,241,0.1);
      color: rgba(150,150,255,0.8);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      outline: none;
    }
    .url-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .url-input {
      padding: 7px 14px;
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.8);
      font-size: 12px;
      font-weight: 600;
      outline: none;
      width: 200px;
      transition: all 0.2s;
    }
    body.light .url-input {
      border-color: rgba(0,0,0,0.15);
      background: rgba(0,0,0,0.06);
      color: rgba(0,0,0,0.7);
    }
    .url-input:focus {
      border-color: rgba(99,102,241,0.5);
      background: rgba(99,102,241,0.08);
    }
    .theme-btn {
      padding: 7px 14px;
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      outline: none;
    }
    .theme-btn:hover { background: rgba(255,255,255,0.1); }
    body.light .theme-btn {
      border-color: rgba(0,0,0,0.15);
      background: rgba(0,0,0,0.05);
      color: rgba(0,0,0,0.5);
    }
    /* light mode label */
    body.light .top-label h1 { color: rgba(0,0,0,0.3); }
    body.light .controls-label { color: rgba(0,0,0,0.2); }
    body.light .dev-btn { border-color: rgba(0,0,0,0.12); background: rgba(0,0,0,0.04); color: rgba(0,0,0,0.4); }
    body.light .dev-btn:hover { background: rgba(0,0,0,0.08); color: rgba(0,0,0,0.8); }
    body.light .dev-btn.active { background: rgba(0,0,0,0.1); color: #000; border-color: rgba(0,0,0,0.3); }
  </style>
</head>
<body>

  <div class="top-label">
    <h1>⛷ SK8 Extreme — Live Phone Preview 📱</h1>
  </div>

  <!-- Phone -->
  <div class="phone-outer" id="phoneOuter">
    <div class="phone" id="phone">

      <!-- Buttons -->
      <div class="btn btn-power"></div>
      <div class="btn btn-action"></div>
      <div class="btn btn-vol-up"></div>
      <div class="btn btn-vol-down"></div>

      <!-- Screen -->
      <div class="screen">
        <div class="dynamic-island"><div class="camera-dot"></div></div>

        <!-- Status bar -->
        <div class="status-bar">
          <span class="status-time" id="clock">10:24</span>
          <div class="status-icons">
            <!-- Signal bars -->
            <svg width="18" height="13" viewBox="0 0 18 13" fill="white">
              <rect x="0" y="8" width="3.5" height="5" rx="1"/>
              <rect x="4.8" y="5" width="3.5" height="8" rx="1"/>
              <rect x="9.6" y="2.5" width="3.5" height="10.5" rx="1"/>
              <rect x="14.4" y="0" width="3.5" height="13" rx="1"/>
            </svg>
            <!-- WiFi -->
            <svg width="16" height="12" viewBox="0 0 24 18" fill="white">
              <path d="M12 14a2 2 0 1 1 0 4 2 2 0 0 1 0-4z"/>
              <path d="M12 9c2.5 0 4.7 1 6.4 2.7l2.1-2.1C18.2 7.3 15.3 6 12 6S5.8 7.3 3.5 9.6l2.1 2.1C7.3 10 9.5 9 12 9z"/>
              <path d="M12 4c3.8 0 7.2 1.5 9.7 4l2.1-2.1C21 3.1 16.8 1 12 1S3 3.1.2 5.9L2.3 8C4.8 5.5 8.2 4 12 4z"/>
            </svg>
            <!-- Battery -->
            <svg width="26" height="13" viewBox="0 0 26 13" fill="none">
              <rect x="0.5" y="0.5" width="21" height="12" rx="3.5" stroke="white" stroke-opacity="0.9"/>
              <rect x="2" y="2" width="16" height="9" rx="2" fill="white"/>
              <path d="M22.5 4.5v4a2 2 0 0 0 0-4z" fill="white" fill-opacity="0.6"/>
            </svg>
          </div>
        </div>

        <!-- Live iframe -->
        <iframe
          id="liveFrame"
          src="http://localhost:5173"
          title="SK8 Live Preview"
          scrolling="yes"
          onload="
            try {
              var s = this.contentDocument.createElement('style');
              s.textContent = '::-webkit-scrollbar{display:none!important}body,html{scrollbar-width:none!important}';
              this.contentDocument.head.appendChild(s);
            } catch(e) {}
          "
        ></iframe>
      </div>

    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="controls-label">Device</div>
    <div class="device-btns">
      <button class="dev-btn active" onclick="setDevice(this,'iphone-se')">SE (375)</button>
      <button class="dev-btn" onclick="setDevice(this,'iphone-14')">14 Pro (390)</button>
      <button class="dev-btn" onclick="setDevice(this,'iphone-max')">14 Max (430)</button>
    </div>
    <div class="url-row">
      <input class="url-input" id="urlInput" value="http://localhost:5173" placeholder="http://localhost:5173" />
      <button class="refresh-btn" onclick="loadUrl()">↺ 載入</button>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="切換背景">☀️</button>
    </div>
  </div>

  <script>
    // ── Live clock ──
    function tick() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2,'0');
      const m = String(now.getMinutes()).padStart(2,'0');
      document.getElementById('clock').textContent = h + ':' + m;
    }
    tick();
    setInterval(tick, 10000);

    // ── Load custom URL ──
    function loadUrl() {
      const url = document.getElementById('urlInput').value.trim();
      if (url) document.getElementById('liveFrame').src = url;
    }
    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') loadUrl();
    });

    // ── Theme toggle ──
    let isDark = true;
    function toggleTheme() {
      isDark = !isDark;
      document.body.classList.toggle('light', !isDark);
      document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
    }

    // ── Device preset ──
    const PRESETS = {
      'iphone-se':  { w: 375, h: 812, r: 55 },
      'iphone-14':  { w: 390, h: 844, r: 55 },
      'iphone-max': { w: 430, h: 932, r: 55 },
    };

    function setDevice(btn, key) {
      const p = PRESETS[key];
      const phone = document.getElementById('phone');
      Object.assign(phone.style, {
        width: p.w + 'px',
        height: p.h + 'px',
        borderRadius: p.r + 'px',
      });
      document.querySelectorAll('.dev-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  </script>

</body>
</html>
